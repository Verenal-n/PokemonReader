<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Читальний Світ — Покемон</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;min-height:100vh;}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#16213e;position:relative;}
.screen{display:none;min-height:100vh;flex-direction:column;}.screen.active{display:flex;}

/* SELECT */
.sel-bg{background:url('start.png') center top/cover no-repeat;flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:0 1rem calc(6rem + env(safe-area-inset-bottom, 0px));overflow-y:auto;}
.sel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.sel-card{background:rgba(10,15,35,.72);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(6px);border-radius:16px;padding:1.25rem .75rem;cursor:pointer;text-align:center;transition:all .2s;}
.sel-card:hover{background:rgba(255,255,255,.14);transform:translateY(-2px);}
.sel-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 8px;overflow:hidden;}
.sel-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:3px;}
.sel-sub{font-size:10px;color:#7eceff;margin-bottom:5px;}
.spill{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;background:rgba(126,206,255,.15);color:#7eceff;display:inline-block;margin:2px 1px;}

/* HEADER */
.hdr{background:rgba(0,0,0,.45);padding:9px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;}
.back-btn{background:none;border:none;cursor:pointer;font-size:18px;color:#7eceff;padding:2px 6px;}
.hdr-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;overflow:hidden;}
.hdr-info{display:none;}
.hdr-name{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-loc{font-size:10px;color:#7eceff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hdr-res{display:flex;gap:4px;flex-shrink:0;flex-wrap:nowrap;justify-content:flex-end;margin-left:auto;}
.rpill{background:rgba(255,255,255,.1);border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;color:#fff;white-space:nowrap;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;text-align:center;}
.rpill-menu{padding:7px 13px;font-size:16px;line-height:1;}
.rpill:hover{background:rgba(255,255,255,.2);}

/* MAIN CONTENT */
.main-content{flex:1;overflow-y:auto;padding:10px;}

/* DEX */
.sec-title{font-size:10px;font-weight:600;color:#7eceff;letter-spacing:.07em;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.dex-grid{display:flex;flex-direction:row;overflow-x:auto;gap:6px;margin-bottom:10px;padding-bottom:4px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}
.dex-grid::-webkit-scrollbar{height:3px;}.dex-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
.dex-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:0 3px 5px;text-align:center;cursor:pointer;transition:all .15s;overflow:hidden;width:68px;flex-shrink:0;position:relative;}
.dex-card:hover{background:rgba(255,255,255,.1);}
.dex-img{width:calc(100% + 6px);height:68px;object-fit:contain;object-position:bottom center;image-rendering:pixelated;margin:0 -3px;display:block;}
.dex-name{font-size:8px;color:#ccc;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;}
.dex-sub{font-size:8px;color:#7eceff;line-height:1.2;}
.dex-empty{flex:1;text-align:center;padding:1.5rem;color:rgba(255,255,255,.25);font-size:12px;}
.chain-row{display:flex;flex-direction:row;overflow-x:auto;gap:6px;margin-bottom:10px;padding-bottom:4px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;}
.chain-row::-webkit-scrollbar{height:3px;}.chain-row::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
.chain-block{background:rgba(251,191,36,.07);border:1px solid rgba(251,191,36,.35);border-radius:10px;padding:5px 8px 5px 6px;display:flex;align-items:center;gap:2px;position:relative;flex-shrink:0;overflow:hidden;}
.chain-block-badge{position:absolute;top:0;right:0;background:#fbbf24;color:#000;font-size:6px;font-weight:700;padding:1px 5px;border-radius:0 8px 0 5px;letter-spacing:.04em;}
.chain-sprite{cursor:pointer;text-align:center;flex-shrink:0;opacity:.9;transition:opacity .15s;}
.chain-sprite:hover{opacity:1;}
.chain-arrow{color:rgba(251,191,36,.5);font-size:11px;flex-shrink:0;line-height:1;margin-top:-6px;}

/* MAP */
.map-card{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;margin-bottom:8px;}
#map-region-tabs{background:rgba(0,0,0,.2);}
.map-svg{display:block;width:100%;}

/* ACTIONS */
.act-card{background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);border-radius:14px;overflow:hidden;margin-bottom:8px;}
.act-hdr{display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px;padding:10px 12px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.05);}
.act-hdr-emoji{font-size:26px;width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}.act-hdr-emoji img{width:48px;height:48px;border-radius:50%;object-fit:cover;}
.act-hdr-info{flex:1;}
.act-hdr-name{font-size:13px;font-weight:600;color:#fff;}
.act-hdr-desc{font-size:10px;color:#7eceff;margin-top:1px;}
.act-hdr-badge{font-size:9px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:2px;}
.act-list{padding:10px;}
.act-row{display:flex;align-items:center;gap:8px;padding:9px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);border-radius:10px;cursor:pointer;transition:all .15s;}
.act-row:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.12);}
.act-icon{font-size:18px;flex-shrink:0;}
.act-body{flex:1;}
.act-title{font-size:12px;font-weight:600;color:#fff;}
.act-desc{font-size:10px;color:#888;margin-top:1px;}
.act-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}

/* CATCH BUTTON */
.catch-btn{width:100%;padding:16px;font-size:15px;font-weight:700;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;}
.catch-btn:hover{filter:brightness(1.1);}
.catch-btn.done{background:rgba(74,222,128,.13);color:#4ade80;cursor:default;border:1px solid rgba(74,222,128,.3);}
.catch-btn.done:hover{filter:none;}
.catch-cost{font-size:12px;opacity:.9;background:rgba(255,255,255,.18);padding:2px 8px;border-radius:10px;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:500;padding:1rem;}
.modal-box{background:#1e2d4a;border:1px solid rgba(126,206,255,.18);border-radius:20px;padding:1.5rem;max-width:340px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-box.wide{max-width:400px;}
.m-img{width:130px;height:130px;image-rendering:pixelated;display:block;margin:0 auto 10px;}
.m-emoji{font-size:46px;text-align:center;margin-bottom:10px;}
.m-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;text-align:center;}
.m-desc{font-size:12px;color:#aaa;margin-bottom:1.25rem;text-align:center;line-height:1.6;}
.m-btns{display:flex;gap:8px;}
.m-btns button{flex:1;font-size:14px;padding:13px 10px;border-radius:12px;font-weight:600;cursor:pointer;min-height:44px;}
.btn-ok{background:#2563eb;color:#fff;border:none;}
.btn-ok:hover{background:#1d4ed8;}
.btn-cancel{background:rgba(255,255,255,.08);color:#ccc;border:1px solid rgba(255,255,255,.15);}
.btn-cancel:hover{background:rgba(255,255,255,.14);}
.flbl{font-size:10px;color:#7eceff;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px;}
.finput{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:10px;padding:9px 12px;color:#fff;font-size:13px;outline:none;margin-bottom:10px;}
.finput:focus{border-color:#7eceff;}
.ppill{background:rgba(126,206,255,.15);color:#7eceff;font-size:12px;font-weight:600;padding:8px;border-radius:10px;text-align:center;margin-bottom:10px;}
.shelf-wrap{width:100%;display:flex;flex-direction:column;gap:16px;background:#111009;border-radius:10px;padding:14px 0;}
.shelf-row{display:flex;flex-direction:column;}
.shelf-label{font-size:9px;color:#a08a5c;padding:0 10px;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
.shelf-books{display:flex;align-items:flex-end;gap:5px;padding:16px 10px 0;height:192px;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-x;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;}
.shelf-books.compact{height:165px;}
.shelf-books::-webkit-scrollbar{height:3px;}.shelf-books::-webkit-scrollbar-track{background:transparent;}.shelf-books::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
.shelf-plank{width:100%;height:13px;background:linear-gradient(180deg,#7a5a32 0%,#5a3e1e 35%,#3e2a10 100%);box-shadow:0 6px 16px rgba(0,0,0,.7),inset 0 2px 0 rgba(255,255,255,.07);border-top:2px solid #9a7a4a;flex-shrink:0;margin-top:0;}
.book-wrap{position:relative;display:flex;flex-direction:row;flex-shrink:0;cursor:pointer;transition:transform .18s;}
.book-wrap:hover{transform:translateY(-14px);z-index:20;}
.book-spine{display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;}
.book-cover{position:relative;overflow:hidden;flex-shrink:0;}
.book-cover::before{content:'';position:absolute;top:0;left:0;bottom:0;width:9px;background:linear-gradient(90deg,rgba(0,0,0,.38) 0%,rgba(0,0,0,.08) 70%,transparent 100%);z-index:2;pointer-events:none;}
.book-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.book-cover-inner{position:absolute;inset:0;}
.book-pages-edge{position:absolute;top:3px;right:-5px;bottom:3px;width:5px;background:repeating-linear-gradient(180deg,#f2ede4 0px,#f2ede4 1.2px,#d5d0c6 1.2px,#d5d0c6 2px);border-radius:0 1px 1px 0;box-shadow:1px 0 4px rgba(0,0,0,.35);z-index:-1;}

/* EVO DOTS */
.evo-dots{display:flex;gap:2px;justify-content:center;margin-top:3px;}
.evo-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);}
.evo-dot.filled{background:#7eceff;}

/* SHOP ROW */
.shop-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);}
.sh-emoji{font-size:20px;flex-shrink:0;}
.sh-info{flex:1;}
.sh-name{font-size:12px;font-weight:600;color:#fff;}
.sh-desc{font-size:10px;color:#888;margin-top:1px;}
.sh-price{font-size:11px;font-weight:600;color:#fbbf24;}
.sh-btn{font-size:11px;padding:5px 12px;border-radius:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;cursor:pointer;margin-top:4px;display:block;}
.sh-btn:disabled{opacity:.3;cursor:not-allowed;}
.sh-btn:not(:disabled):hover{background:rgba(255,255,255,.2);}

/* SIDE PANEL */
#side-panel{position:fixed;top:0;right:-380px;width:350px;max-width:88vw;height:100vh;height:100dvh;background:#1e2d4a;border-left:1px solid rgba(126,206,255,.15);z-index:400;transition:right .25s;padding:1rem;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;}
#side-panel.open{right:0;}
#side-ov{position:fixed;inset:0;z-index:399;display:none;background:rgba(0,0,0,.4);}
#side-ov.open{display:block;}

/* TOAST */
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1e2d4a;border:1px solid rgba(126,206,255,.3);color:#7eceff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:700;white-space:nowrap;}
.toast.show{opacity:1;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px;}
</style>
</head>
<body>
<div class="app">

<!-- SELECT -->
<div id="screen-select" class="screen active">
  <div class="sel-bg">
    <div class="sel-grid" id="sel-grid"></div>
  </div>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div class="hdr">
    <button class="back-btn" onclick="showSelect()">←</button>
    <div class="hdr-av" id="hdr-av" onclick="openProfileSettings()" style="cursor:pointer"></div>
    <div class="hdr-info">
      <div class="hdr-name" id="hdr-name"></div>
      <div class="hdr-loc" id="hdr-loc"></div>
    </div>
    <div class="hdr-res">
      <span id="save-status" style="font-size:11px;font-weight:700;visibility:hidden;display:inline-block;width:14px;text-align:center;flex-shrink:0"></span>
      <div class="rpill" id="hdr-bookpoints" onclick="openSidePanel()" title="Книжкові бали — трать на лов">📘0</div>
      <div class="rpill" id="hdr-coins" title="Монети — трать у Магазині">🪙0</div>
      <div class="rpill" id="hdr-books" title="Прочитано книг за весь час">📚0</div>
      <div class="rpill rpill-menu" onclick="openSidePanel()">☰</div>
    </div>
  </div>
  <div class="main-content">
    <div class="sec-title"><span>Колекція</span><span id="dex-count" style="font-weight:600;color:#ccc;font-size:15px;text-transform:none;letter-spacing:0"></span></div>
    <div class="dex-grid" id="dex-grid"></div>
    <div id="dex-complete"></div>
    <div class="map-card"><div id="map-region-tabs"></div><svg id="map-svg" class="map-svg" viewBox="0 0 460 240" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="mapBg" cx="50%" cy="50%" r="70%">
          <stop offset="0%" stop-color="#162032"/>
          <stop offset="100%" stop-color="#070e1a"/>
        </radialGradient>
      </defs>
      <rect id="map-bg" width="460" height="240" fill="url(#mapBg)" style="display:none"/>
      <image id="map-png" href="map1.png" x="0" y="0" width="460" height="240" preserveAspectRatio="xMidYMid slice"/>
      <g id="map-edges"></g><g id="map-nodes"></g><g id="map-markers"></g>
    </svg></div>
    <div class="act-card">
      <div class="act-hdr">
        <div class="act-hdr-emoji" id="act-emoji"></div>
        <div class="act-hdr-info"><div class="act-hdr-name" id="act-name"></div><div class="act-hdr-desc" id="act-desc"></div></div>
        <div class="act-hdr-badge" id="act-badge"></div>
      </div>
      <div class="act-list" id="act-list"></div>
    </div>
  </div>
</div>
</div>

<div id="side-ov" onclick="closeSidePanel()"></div>
<div id="side-panel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
    <span style="font-size:14px;font-weight:700;color:#fff">Меню гравця</span>
    <button onclick="closeSidePanel()" style="background:none;border:none;cursor:pointer;font-size:18px;color:#7eceff">✕</button>
  </div>
  <div id="side-content" style="flex:1"></div>
  <div style="padding-top:1rem;margin-top:1rem;border-top:1px solid rgba(255,255,255,.07)">
    <button onclick="closeSidePanel();saveToCloud(cur)" style="width:100%;padding:12px;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.25);border-radius:10px;color:#4ade80;font-size:13px;font-weight:600;cursor:pointer">💾 Зберегти прогрес</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════ PLAYERS ═══════════
const PLAYERS=[
  {id:'lionhard',  name:'Lionhard',  emoji:'🦁', color:'#f97316', border:'#f97316'},
  {id:'esperanza', name:'Esperanza', emoji:'🌸', color:'#f43f5e', border:'#f43f5e'},
  {id:'demetrius', name:'Demetrius', emoji:'⚡', color:'#3b82f6', border:'#3b82f6'},
];

// ═══════════ EVOLUTION CHAINS ═══════════
// Each chain is one linear evolution line. Player holds exactly ONE stage per chain.
// Catching always tries the NEXT not-yet-owned stage; once the final stage is owned,
// the chain is fully complete and stops appearing in the wild.
function S(name,pid,mega){return{name,pid,mega:!!mega};}

const CHAINS=[
  // ── OAK'S LAB (15, fixed) ──────────────────────────────
  {id:'bulbasaur', loc:'oak', stages:[S('Bulbasaur',1),S('Ivysaur',2),S('Venusaur',3),S('Mega Venusaur',10033,true)]},
  {id:'charmander', loc:'oak', stages:[S('Charmander',4),S('Charmeleon',5),S('Charizard',6),S('Mega Charizard X',10034,true),S('Mega Charizard Y',10035,true)]},
  {id:'squirtle', loc:'oak', stages:[S('Squirtle',7),S('Wartortle',8),S('Blastoise',9),S('Mega Blastoise',10036,true)]},
  {id:'pikachu', loc:'oak', stages:[S('Pikachu',25),S('Raichu',26)]},

  // ── PALLET TOWN (22) ────────────────────────────────────
  {id:'spearow', loc:'pallet', stages:[S('Spearow',21),S('Fearow',22)]},
  {id:'rattata', loc:'pallet', stages:[S('Rattata',19),S('Raticate',20)]},
  {id:'purrloin', loc:'pallet', stages:[S('Purrloin',509),S('Liepard',510)]},
  {id:'chansey', loc:'pallet', stages:[S('Chansey',113),S('Blissey',242)]},
  {id:'abra', loc:'pallet', stages:[S('Abra',63),S('Kadabra',64),S('Alakazam',65),S('Mega Alakazam',10037,true)]},
  {id:'jigglypuff', loc:'pallet', stages:[S('Jigglypuff',39),S('Wigglytuff',40)]},
  {id:'meowth', loc:'pallet', stages:[S('Meowth',52),S('Persian',53)]},
  {id:'growlithe', loc:'pallet', stages:[S('Growlithe',58),S('Arcanine',59)]},
  {id:'tyrogue', loc:'pallet', stages:[S('Tyrogue',236),S('Hitmonlee',106),S('Hitmonchan',107),S('Hitmontop',237)]},

  // ── VIRIDIAN FOREST (22) ────────────────────────────────
  {id:'pidgey', loc:'forest', stages:[S('Pidgey',16),S('Pidgeotto',17),S('Pidgeot',18),S('Mega Pidgeot',10073,true)]},
  {id:'ekans', loc:'forest', stages:[S('Ekans',23),S('Arbok',24)]},
  {id:'weedle', loc:'forest', stages:[S('Weedle',13),S('Kakuna',14),S('Beedrill',15),S('Mega Beedrill',10090,true)]},
  {id:'caterpie', loc:'forest', stages:[S('Caterpie',10),S('Metapod',11),S('Butterfree',12)]},
  {id:'bellsprout', loc:'forest', stages:[S('Bellsprout',69),S('Weepinbell',70),S('Victreebel',71)]},
  {id:'hoothoot', loc:'forest', stages:[S('Hoothoot',163),S('Noctowl',164)]},
  {id:'spinarak', loc:'forest', stages:[S('Spinarak',167),S('Ariados',168)]},
  {id:'clefairy', loc:'forest', stages:[S('Clefairy',35),S('Clefable',36)]},

  // ── GLADE (20) ───────────────────────────────────────────
  {id:'oddish', loc:'glade', stages:[S('Oddish',43),S('Gloom',44),S('Vileplume',45),S('Bellossom',182)]},
  {id:'chimchar', loc:'glade', stages:[S('Chimchar',390),S('Monferno',391),S('Infernape',392)]},
  {id:'tangela', loc:'glade', stages:[S('Tangela',114),S('Tangrowth',465)]},
  {id:'shaymin', loc:'glade', stages:[S('Shaymin',492)]},
  {id:'pinsir', loc:'glade', stages:[S('Pinsir',127),S('Mega Pinsir',10040,true)]},
  {id:'aerodactyl', loc:'glade', stages:[S('Aerodactyl',142),S('Mega Aerodactyl',10042,true)]},
  {id:'exeggcute', loc:'glade', stages:[S('Exeggcute',102),S('Exeggutor',103)]},
  {id:'cubone', loc:'glade', stages:[S('Cubone',104),S('Marowak',105)]},
  {id:'ponyta', loc:'glade', stages:[S('Ponyta',77),S('Rapidash',78)]},

  // ── BUTTERFLY GLADE (21) ─────────────────────────────────
  {id:'venonat', loc:'butterfly', stages:[S('Venonat',48),S('Venomoth',49)]},
  {id:'surskit', loc:'butterfly', stages:[S('Surskit',283),S('Masquerain',284)]},
  {id:'larvesta', loc:'butterfly', stages:[S('Larvesta',636),S('Volcarona',637)]},
  {id:'combee', loc:'butterfly', stages:[S('Combee',415),S('Vespiquen',416)]},

function chainsForLoc(locId){return CHAINS.filter(c=>c.loc===locId);}
function stagePrice(chain,idx){
  const st=chain.stages[idx];
  if(chain.stages.length===1) return 10;
  if(st.mega) return 20;
  return idx===0?5:idx===1?7:10;
}
function nextStageIdx(d,chain){const idx=d.progress[chain.id];return idx===undefined?0:idx+1;}
function catchableStages(locId){
  const d=pd();const out=[];
  chainsForLoc(locId).forEach(chain=>{
    const idx=nextStageIdx(d,chain);
    if(idx>=chain.stages.length)return;
    const weight=chain.stages[idx].mega?1:3;
    for(let i=0;i<weight;i++) out.push({chain,idx});
  });
  return out;
}
function locHasMega(d,locId){
  return chainsForLoc(locId).some(chain=>{
    const idx=d.progress[chain.id];
    return idx!==undefined && chain.stages[idx].mega;
  });
}
function caughtCountIn(d,locIds){
  let n=0;
  locIds.forEach(l=>chainsForLoc(l).forEach(c=>{if(d.progress[c.id]!==undefined)n++;}));
  return n;
}
function megasCaughtIn(d,locIds){
  let n=0;
  locIds.forEach(l=>chainsForLoc(l).forEach(c=>{const idx=d.progress[c.id];if(idx!==undefined&&c.stages[idx].mega)n++;}));
  return n;
}
function markCompletion(d,chain,idx){
  if(idx!==chain.stages.length-1)return;
  if(!d.completedOrder)d.completedOrder=[];
  const i=d.completedOrder.indexOf(chain.id);
  if(i>=0)d.completedOrder.splice(i,1);
  d.completedOrder.push(chain.id);
}
function isLocComplete(locId){
  const d=pd();const chains=chainsForLoc(locId);
  if(!chains.length)return false;
  return chains.every(c=>d.progress[c.id]===c.stages.length-1);
}

function reqMet(d,req){
  if(!req)return true;
  if(req.type==='keyChain') return d.progress[req.chainId]!==undefined && d.progress[req.chainId]>=req.stageIdx;
  if(req.type==='locMega') return locHasMega(d,req.loc);
  if(req.type==='count') return caughtCountIn(d,req.locs)>=req.need;
  if(req.type==='megaCount') return megasCaughtIn(d,req.locs)>=req.need;
  return false;
}
function unlockHintText(loc){
  const req=loc.unlockReq;if(!req)return'';
  const d=pd();
  if(req.type==='keyChain'){
    const chain=CHAINS.find(c=>c.id===req.chainId);const stage=chain.stages[req.stageIdx];
    const cur=d.progress[req.chainId];
    const seq=chain.stages.map((s,i)=>{
      if(i===req.stageIdx)return`<b style="color:#fbbf24">${s.name}</b>`;
      if(cur!==undefined&&i<=cur)return`${s.name} ✓`;
      return s.name;
    }).join(' → ');
    const srcLoc=LOCS[chain.loc];
    return`Потрібен ключовий покемон: <b>${stage.name}</b>.<br><span style="font-size:11px;opacity:.85">${seq}</span><br>Злови його в «${srcLoc?srcLoc.name:''}» або докупи в 🛒 Магазині.`;
  }
  if(req.type==='locMega'){
    const locName=LOCS[req.loc]?.name||req.loc;
    return`Потрібна будь-яка Мега-еволюція 🐉 з локації <b>${locName}</b>.`;
  }
  if(req.type==='count'){
    const have=caughtCountIn(d,req.locs);
    return`Потрібно зловити ${req.need} видів покемонів<br>(зараз: ${have} / ${req.need}).`;
  }
  if(req.type==='megaCount'){
    const have=megasCaughtIn(d,req.locs);
    return`Потрібно ${req.need} Мега-еволюцій 🐉<br>(зараз: ${have} / ${req.need}).`;
  }
  return'';
}

// ═══════════ DEX (COLLECTION) ═══════════
function renderDex(){
  const d=pd();
  const held=CHAINS.filter(c=>d.progress[c.id]!==undefined);
  document.getElementById('dex-count').innerHTML=`🐣 ${held.length} &nbsp; 🐉 ${megasCaughtIn(d,ALL_KANTO_LOCS)}`;
  const grid=document.getElementById('dex-grid');
  const completeEl=document.getElementById('dex-complete');
  if(!held.length){grid.innerHTML='<div class="dex-empty">Ще нікого не спіймано.<br>Прочитай книгу і почни ловити!</div>';completeEl.innerHTML='';return;}
  const inProgress=held.filter(c=>d.progress[c.id]<c.stages.length-1);
  const done=held.filter(c=>d.progress[c.id]===c.stages.length-1);
  const order=d.completedOrder||[];
  done.sort((a,b)=>{
    const ai=order.indexOf(a.id),bi=order.indexOf(b.id);
    if(ai===-1&&bi===-1)return 0;
    if(ai===-1)return 1;
    if(bi===-1)return -1;
    return bi-ai;
  });
  grid.innerHTML=inProgress.map(chain=>{
    const idx=d.progress[chain.id];const stage=chain.stages[idx];
    const dots=chain.stages.length>1?`<div class="evo-dots">${chain.stages.map((s,i)=>`<div class="evo-dot ${i<=idx?'filled':''}"></div>`).join('')}</div>`:'';
    return`<div class="dex-card" onclick="openDexCard('${chain.id}')">
      <img class="dex-img" src="${img(stage.pid)}" onerror="this.outerHTML='<div style=font-size:24px;text-align:center;height:68px;line-height:68px>${stage.name[0]}</div>'">
      <div class="dex-name">${stage.name}</div>
      ${dots}
    </div>`;
  }).join('')||'<div class="dex-empty">Усі спіймані ланцюжки завершено!</div>';
  if(!done.length){completeEl.innerHTML='';return;}
  const chainHtml=done.map(chain=>{
    const sprites=chain.stages.map((s,i)=>(i>0?`<div class="chain-arrow">→</div>`:'')+
      `<div class="chain-sprite" onclick="event.stopPropagation();openDexCard('${chain.id}')">
        <img style="width:38px;height:38px;object-fit:contain;image-rendering:pixelated" src="${img(s.pid)}" onerror="this.style.display='none'">
        <div style="font-size:6.5px;color:#999;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:44px;margin-top:1px;line-height:1.2">${s.name}</div>
      </div>`).join('');
    return`<div class="chain-block"><div class="chain-block-badge">✓</div>${sprites}</div>`;
  }).join('');
  completeEl.innerHTML=`<div style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#fbbf24;margin:4px 0 5px;opacity:.8">🏆 Завершені</div><div class="chain-row">${chainHtml}</div>`;
}

    let mh='';
    Object.entries(byLoc).forEach(([lid,list])=>{
      const loc=LOCS_JOHTO[lid];if(!loc)return;
      const nr=22;const offs=list.length===1?[0]:list.length===2?[-8,8]:[-10,0,10];

  const r=26;let nh='';

      nh+=`<text x="${loc.cx+r-2}" y="${loc.cy-r+3}" text-anchor="middle" dominant-baseline="middle" font-size="8.5" font-weight="700" font-family="sans-serif" fill="#070e1a">✓</text>`;

    +`<text x="${SHOP_NODE.cx}" y="${SHOP_NODE.cy+1}" text-anchor="middle" dominant-baseline="middle" font-size="15" font-family="sans-serif">🛒</text>`
    +`<text x="${SHOP_NODE.cx}" y="${SHOP_NODE.cy+22+11}" text-anchor="middle" font-size="8.5" fill="#e2e8f0" font-family="sans-serif" font-weight="600">Магазин</text>`
    +`</g>`;
  document.getElementById('map-nodes').innerHTML=nh;
  const byLoc={};
  PLAYERS.forEach(p=>{if((state.players[p.id].region||'kanto')==='kanto'){const lid=state.players[p.id].location;if(!byLoc[lid])byLoc[lid]=[];byLoc[lid].push(p);}});
  let mh='';
  Object.entries(byLoc).forEach(([lid,list])=>{
    const loc=LOCS[lid];if(!loc)return;
    const offs=list.length===1?[0]:list.length===2?[-8,8]:[-10,0,10];
    list.forEach((p,i)=>{mh+=`<circle cx="${loc.cx+offs[i]}" cy="${loc.cy-r-7}" r="6" fill="${pClr(p,state.players[p.id])}" stroke="#fff" stroke-width="2"/>`;});

function renderActions(){
  const d=pd();
  const loc=cLoc();
  document.getElementById('act-emoji').innerHTML=locIconEl(loc.id,48);
  document.getElementById('act-name').textContent=loc.name;
  const chains=chainsForLoc(loc.id);
  let desc='';
  if(chains.length){
    const totalSpecies=chains.reduce((s,c)=>s+c.stages.length,0);
    const caughtSpecies=chains.reduce((s,c)=>{const idx=d.progress[c.id];return s+(idx!==undefined?idx+1:0);},0);
    const allDone=chains.every(c=>d.progress[c.id]===c.stages.length-1);
    desc='Спіймано: '+caughtSpecies+'/'+totalSpecies+(allDone?' ✓':'');
  }
  document.getElementById('act-desc').textContent=desc;
  const ab=document.getElementById('act-badge');
  ab.textContent=loc.badge||'';ab.style.background=loc.badgeBg||'';ab.style.color=loc.badgeTxt||'';
  let html;
  if(loc.id==='map2'){
    html=`<div class="act-row" onclick="enterJohto()"><div class="act-icon">🌏</div><div class="act-body"><div class="act-title">Перейти до Регіону Джото</div><div class="act-desc">Новий регіон відкрито — покемони чекають попереду!</div></div></div>`;
  } else if(loc.id==='newbark'){
    html=`<div class="act-row" onclick="returnToKanto()"><div class="act-icon">🗺️</div><div class="act-body"><div class="act-title">Повернутись до Регіону Канто</div></div></div>`;
  } else {
    const pool=catchableStages(loc.id);
    if(!pool.length){
      html=`<button class="catch-btn done">✓ Усі покемони тут спіймані!</button>`;
    } else {
      html=`<button class="catch-btn" onclick="doCatch()">Ловити покемона <span class="catch-cost">1📘</span></button>`;
    }
  }
  document.getElementById('act-list').innerHTML=html;
}

function doCatch(){
  const d=pd();
  if(d.bookPoints<1){
    qM(()=>mEmoji('📘','Мало книжкових балів','Прочитай книгу, щоб отримати 📘 і зловити покемона!',
      [{l:'Додати книгу',ok:true,cb:()=>{closeModal();openSidePanel();}},{l:'Ок',cb:closeModal}]));
    return;
  }
  const pool=catchableStages(d.location);
  if(!pool.length){showToast('Тут усі покемони вже спіймані!');return;}
  d.bookPoints--;
  const pick=pool[ri(0,pool.length-1)];
  d.progress[pick.chain.id]=pick.idx;
  markCompletion(d,pick.chain,pick.idx);
  const stage=pick.chain.stages[pick.idx];
  renderRes();renderDex();renderActions();renderMap();
  const opened=checkUnlocks();
  if(opened.length)renderMap();
  saveToCloud(cur);
  qM(()=>mImg(img(stage.pid),'Спіймано '+stage.name+'!','Тепер у твоїй колекції.',[{l:'Чудово!',ok:true,cb:closeModal}]));
  opened.forEach(u=>qM(()=>mEmoji('🎉','Відкрито!',`${u.emoji} ${u.name} тепер доступна!`,[{l:'Чудово!',ok:true,cb:closeModal}])));
}

function chainKeyLoc(chainId){
  const d=pd();
  return Object.values(LOCS).find(loc=>!d.unlockedLocs.includes(loc.id)&&loc.unlockReq&&loc.unlockReq.type==='keyChain'&&loc.unlockReq.chainId===chainId);
}

function openShop(){
  const d=pd();
  const rows=[];
  d.unlockedLocs.forEach(locId=>{
    chainsForLoc(locId).forEach(chain=>{
      const idx=nextStageIdx(d,chain);
      if(idx>=chain.stages.length)return;
      rows.push({chain,idx,stage:chain.stages[idx],price:stagePrice(chain,idx)});
    });
  });
  rows.sort((a,b)=>{
    const ak=chainKeyLoc(a.chain.id)&&a.idx===chainKeyLoc(a.chain.id).unlockReq.stageIdx?1:0;
    const bk=chainKeyLoc(b.chain.id)&&b.idx===chainKeyLoc(b.chain.id).unlockReq.stageIdx?1:0;
    return bk-ak;
  });
  const html=rows.map(r=>{
    const keyLoc=chainKeyLoc(r.chain.id);
    let keyNote='';
    if(keyLoc){
      keyNote=r.idx===keyLoc.unlockReq.stageIdx
        ?`<div style="margin-top:3px;font-size:9px;font-weight:700;color:#4ade80">🔑 Відкриє «${keyLoc.name}»!</div>`
        :`<div style="margin-top:3px;font-size:9px;color:#fbbf24">→ веде до ключа «${keyLoc.name}»</div>`;
    }
    return`<div class="shop-row" ${keyLoc&&r.idx===keyLoc.unlockReq.stageIdx?'style="background:rgba(74,222,128,.06);border-radius:8px;padding:8px 6px;margin:0 -6px"':''}>
      <img class="sh-emoji" src="${img(r.stage.pid)}" style="width:40px;height:40px;image-rendering:pixelated" onerror="this.style.display='none'">
      <div class="sh-info"><div class="sh-name">${r.stage.name}</div><div class="sh-desc">${r.chain.stages.length>1?'Стадія '+(r.idx+1)+'/'+r.chain.stages.length:'Локація: '+(LOCS[r.chain.loc]?.name||'')}</div>${keyNote}</div>
      <div style="text-align:right;flex-shrink:0"><div class="sh-price">🪙${r.price}</div>
      <button class="sh-btn" onclick="buyChainStage('${r.chain.id}',${r.idx})" ${d.coins<r.price?'disabled':''}>Купити</button></div>
    </div>`;
  }).join('');
  mHTML(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="m-title" style="margin:0">🛒 Магазин</div>
    <div style="font-size:14px;font-weight:700;color:#fbbf24">🪙${d.coins}</div>
  </div><div style="max-height:340px;overflow-y:auto;padding-right:10px;margin-right:-10px">${html||'<div style="font-size:12px;color:#555;text-align:center;padding:1rem">Немає нічого на продаж — спочатку відкрий локації!</div>'}</div>
  <button class="btn-cancel" style="width:100%;margin-top:12px;padding:13px;font-size:14px;min-height:44px" onclick="closeModal()">Закрити</button>`,true);
}

function buyChainStage(chainId,idx){
  const d=pd();const chain=CHAINS.find(c=>c.id===chainId);if(!chain)return;
  const price=stagePrice(chain,idx);
  if(d.coins<price)return;
  d.coins-=price;d.progress[chainId]=idx;
  markCompletion(d,chain,idx);
  closeModal();renderRes();renderDex();renderActions();renderMap();
  const opened=checkUnlocks();
  if(opened.length)renderMap();
  saveToCloud(cur);
  qM(()=>mImg(img(chain.stages[idx].pid),'Куплено!',chain.stages[idx].name+' тепер у твоїй колекції.',[{l:'Чудово!',ok:true,cb:closeModal}]));
  opened.forEach(u=>qM(()=>mEmoji('🎉','Відкрито!',`${u.emoji} ${u.name} тепер доступна!`,[{l:'Чудово!',ok:true,cb:closeModal}])));
}

function _bookH(p){if(p<100)return 178;if(p<250)return 190;if(p<400)return 202;if(p<600)return 214;if(p<800)return 224;if(p<1000)return 234;return 244;}
function _coverW(p){if(p<100)return 90;if(p<250)return 100;if(p<400)return 108;if(p<600)return 114;if(p<800)return 119;if(p<1000)return 123;return 127;}
function _spineW(p){const[A,B,C,D]=[40,1500,6,65];const r=(Math.log(Math.max(p,A))-Math.log(A))/(Math.log(B)-Math.log(A));return Math.round(C+r*(D-C));}
function _titleSz(text,cw){const b=cw<100?10:cw<115?11:12;if(text.length>30)return b-1;if(text.length>18)return b;return b+1;}

function _renderBookPreviewHTML(book){
  const p=book.pages||1;
  const h=_bookH(p),sw=_spineW(p);
  const coverUrl=book.coverUrl||null;
  const cw=coverUrl?Math.round(h*2/3):_coverW(p);
  const [top,bot,spine]=_colorFor(book.title);
  const scale=0.58;
  const vh=Math.round(h*scale),vw=Math.round((sw+cw+6)*scale);
  const spineGrad=`linear-gradient(90deg,${bot} 0%,${spine} 40%,${top} 100%)`;
  const coverGrad=`linear-gradient(150deg,${top} 0%,${bot} 100%)`;
  const tsz=_titleSz(book.title,cw);
  const inner=`<div style="display:flex;flex-direction:row;height:${h}px;flex-shrink:0">
    <div style="width:${sw}px;height:${h}px;background:${spineGrad};display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:inset 2px 0 5px rgba(255,255,255,.06),inset -3px 0 8px rgba(0,0,0,.45)">
      ${sw>=12?`<span style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:${Math.max(7,sw>20?9:8)}px;font-weight:700;color:rgba(255,255,255,.7);white-space:normal;word-break:break-word;text-align:center;overflow:visible;max-height:${h-16}px">${book.title}</span>`:''}
    </div>
    <div style="width:${cw}px;height:${h}px;background:${coverGrad};position:relative;overflow:hidden;box-shadow:2px 2px 0 rgba(0,0,0,.3),4px 5px 0 rgba(0,0,0,.18),6px 10px 20px rgba(0,0,0,.55)">
      ${coverUrl?`<img src="${coverUrl}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`:''}
      ${!coverUrl?`<div style="position:absolute;inset:0">
        <div style="position:absolute;top:9px;left:5px;right:5px;font-size:8px;opacity:.5;text-transform:uppercase;letter-spacing:.08em;color:#fff">${book.author||''}</div>
        <div style="position:absolute;top:50%;left:5px;right:5px;transform:translateY(-50%);font-size:${tsz}px;font-weight:800;text-align:center;color:#fff;white-space:normal;word-break:break-word">${book.title}</div>
        <div style="position:absolute;bottom:6px;left:5px;right:5px;font-size:8px;opacity:.45;color:#fff;text-align:right">${p} стор.</div>
      </div>`:''}
    </div>
  </div>`;
  return`<div style="width:${vw}px;height:${vh}px;overflow:hidden;margin:0 auto 12px"><div style="width:${sw+cw}px;transform:scale(${scale});transform-origin:top left">${inner}</div></div>`;
}

function _renderBookHTML(book, i, sc=1){
  const p=book.pages||1;
  const h=Math.round(_bookH(p)*sc);
  const sw=Math.round(_spineW(p)*sc);
  const coverUrl=book.coverUrl||null;
  const cw=coverUrl?Math.round(h*2/3):Math.round(_coverW(p)*sc);
  const [top,bot,spine]=_colorFor(book.title);
  const tsz=Math.max(7,Math.round(_titleSz(book.title,cw)*sc));
  const fsz=Math.max(6,Math.round(8*sc));
  const spineGrad=`linear-gradient(90deg,${bot} 0%,${spine} 40%,${top} 100%)`;
  const coverGrad=`linear-gradient(150deg,${top} 0%,${bot} 100%)`;
  const spineText=sw>=10?`<span style="writing-mode:vertical-rl;transform:rotate(180deg);font-size:${Math.max(6,sw>14?Math.round(9*sc):Math.round(8*sc))}px;font-weight:700;color:rgba(255,255,255,.75);white-space:normal;word-break:break-word;text-align:center;overflow:visible;max-height:${h-20}px">${book.title}</span>`:'';
  const textOverlay=!coverUrl?`<div class="book-cover-inner">
    <div style="position:absolute;top:9px;left:5px;right:5px;font-size:${fsz}px;opacity:.5;text-transform:uppercase;letter-spacing:.06em;color:#fff">${book.author||''}</div>
    <div style="position:absolute;top:50%;left:5px;right:5px;transform:translateY(-50%);font-size:${tsz}px;font-weight:800;text-align:center;color:#fff;white-space:normal;word-break:break-word">${book.title}</div>
    <div style="position:absolute;bottom:6px;left:5px;right:5px;font-size:${fsz}px;opacity:.45;color:#fff;text-align:right">${p} стор.</div>
  </div>`:'';
  return`<div class="book-wrap" style="height:${h}px" onclick="openBookDetail(${i})" title="">
    <div class="book-spine" style="width:${sw}px;height:${h}px;background:${spineGrad};box-shadow:inset 2px 0 4px rgba(255,255,255,.06),inset -2px 0 6px rgba(0,0,0,.45),-2px 2px 8px rgba(0,0,0,.55)">${spineText}</div>
    <div class="book-cover" style="width:${cw}px;height:${h}px;background:${coverGrad};box-shadow:2px 2px 0 rgba(0,0,0,.3),3px 4px 0 rgba(0,0,0,.18),5px 8px 16px rgba(0,0,0,.55),inset -3px 0 10px rgba(0,0,0,.22)">
      ${coverUrl?`<img src="${coverUrl}" onerror="this.style.display='none'">`:''}
      ${textOverlay}
      <div class="book-pages-edge"></div>
    </div>
  </div>`;
}

function _buildLibraryHTML(){
  const d=pd();
  const books=d.books||[];
  const totalPages=books.reduce((s,b)=>s+(b.pages||0),0);
  const header=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:#7eceff;font-weight:600">Моя Бібліотека</div>
    <div style="font-size:11px;color:#778">${books.length} книг · ${totalPages} стор.</div></div>`;
  if(!books.length){
    return header+`<div style="text-align:center;padding:40px 0;color:#778;font-size:13px;line-height:2">📚<br>Ще немає книжок.<br>Додай першу книгу!</div>`;
  }
  // Fixed 3 shelves by size — each one scrolls sideways instead of spawning new rows.
  const SHELVES=[
    {label:'Менші книги · до 300 стор.',    test:p=>p<300,              cls:'compact'},
    {label:'Середні книги · 300–700 стор.', test:p=>p>=300&&p<700,      cls:''},
    {label:'Цеглини · 700+ стор.',          test:p=>p>=700,             cls:''},
  ];
  const withIdx=[...books].map((b,i)=>({b,i})).reverse(); // newest first within each shelf
  let shelves='';
  SHELVES.forEach(sh=>{
    const items=withIdx.filter(({b})=>sh.test(b.pages||0));
    if(!items.length)return;
    shelves+=`<div class="shelf-row">
      <div class="shelf-label">${sh.label} · ${items.length}</div>
      <div class="shelf-books ${sh.cls}">${items.map(({b,i})=>_renderBookHTML(b,i,0.72)).join('')}</div>
      <div class="shelf-plank"></div>
    </div>`;
  });
  return header+`<div class="shelf-wrap">${shelves}</div>`;
}

function openBookDetail(i){
  const d=pd();const book=(d.books||[])[i];if(!book)return;
  const [top,bot]=_colorFor(book.title);
  const cw=_coverW(book.pages||1),h=_bookH(book.pages||1);
  const coverHtml=book.coverUrl
    ?`<img src="${book.coverUrl}" style="width:${cw}px;height:${h}px;object-fit:cover;border-radius:4px;display:block;margin:0 auto 10px" onerror="this.style.display='none'">`
    :`<div style="width:${cw}px;height:${h}px;background:linear-gradient(150deg,${top} 0%,${bot} 100%);border-radius:4px;margin:0 auto 10px"></div>`;
  mHTML(`${coverHtml}
    <div class="m-title" style="font-size:15px">${book.title}</div>
    <div style="text-align:center;font-size:12px;color:#aaa;margin-bottom:4px">${book.author||''}</div>
    <div style="text-align:center;font-size:11px;color:#778;margin-bottom:12px">${book.pages} стор. · ${book.date||''}</div>
    <div class="flbl" style="opacity:.6">URL обкладинки</div>
    <input type="url" id="bd-cover-url" class="finput" placeholder="https://…" value="${book.coverUrl||''}" style="font-size:11px">
    <button class="btn-ok" style="width:100%;margin-bottom:8px;padding:12px;font-size:13px" onclick="saveBookCover(${i})">Зберегти обкладинку</button>
    <button class="btn-cancel" style="width:100%;padding:12px;font-size:13px" onclick="confirmDeleteBook(${i})">🗑️ Видалити книгу</button>`);
}

function saveBookCover(i){
  const d=pd();const book=(d.books||[])[i];if(!book)return;
  const url=(document.getElementById('bd-cover-url').value||'').trim();
  book.coverUrl=url||null;
  saveToCloud(cur);closeModal();setSideTab('library');
}

function confirmDeleteBook(i){
  const d=pd();const book=(d.books||[])[i];if(!book)return;
  qM(()=>mEmoji('🗑️','Видалити книжку?',`"${book.title}"`,
    [{l:'Видалити',cb:()=>{closeModal();d.books.splice(i,1);saveToCloud(cur);setSideTab('library');}},
     {l:'Скасувати',ok:true,cb:closeModal}]));
}

function closeSidePanel(){
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('side-ov').classList.remove('open');
}

async function parseGoodreadsLink(){
  const url=(document.getElementById('sp-goodreads').value||'').trim();
  if(!url){showToast('Встав посилання на Goodreads');return;}
  if(!SCRIPT_URL){showToast('Не налаштовано хмарне збереження — розпізнавання недоступне');return;}
  const btn=document.getElementById('sp-parse-btn');
  btn.disabled=true;btn.textContent='Розпізнаю…';
  const data=await _jsonp(SCRIPT_URL+'?action=parseBook&url='+encodeURIComponent(url));
  btn.disabled=false;btn.textContent='Розпізнати';
  if(!data||data.error){showToast('Не вдалося розпізнати сторінку — заповни вручну');return;}
  if(data.title)document.getElementById('sp-book').value=data.title;
  if(data.author)document.getElementById('sp-author').value=data.author;
  if(data.pages)document.getElementById('sp-pages').value=data.pages;
  if(data.coverUrl)document.getElementById('sp-cover').value=data.coverUrl;
  updSP();
  showToast('Розпізнано! Перевір поля і натисни «Зарахувати книгу»');
}

function updSP(){
  const v=parseInt(document.getElementById('sp-pages').value);
  const el=document.getElementById('sp-prev');
  if(v&&v>0){
    const coins=coinsForPages(v);
    el.style.display='block';
    el.innerHTML=`<div class="ppill">+1📘 &nbsp; +${coins}🪙</div>`;
  } else el.style.display='none';
}

function submitPages(){
  const pages=parseInt(document.getElementById('sp-pages').value);
  const title=(document.getElementById('sp-book').value||'').trim();
  const author=(document.getElementById('sp-author').value||'').trim();
  const coverUrl=(document.getElementById('sp-cover').value||'').trim();
  if(!title){showToast('Введи назву книги');return;}
  if(!author){showToast('Введи автора');return;}
  if(!pages||pages<1){showToast('Введи кількість сторінок');return;}
  const d=pd();
  const coins=coinsForPages(pages);
  d.bookPoints=(d.bookPoints||0)+1;
  d.booksRead=(d.booksRead||0)+1;
  d.coins=(d.coins||0)+coins;
  if(!d.books)d.books=[];
  const book={title,author,pages,date:new Date().toLocaleDateString('uk-UA'),coverUrl:coverUrl||null};
  d.books.push(book);
  renderRes();renderActions();closeSidePanel();saveToCloud(cur);
  const preview=_renderBookPreviewHTML(book);
  qM(()=>mHTML(`${preview}<div class="m-title">Книга додана!</div><div class="m-desc" style="text-align:center">+1📘 &nbsp; +${coins}🪙</div><div class="m-btns"><button class="btn-ok" onclick="closeModal()">Вперед!</button></div>`));
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ═══════════ CLOUD SAVE ═══════════
function showSaveStatus(s){
  const el=document.getElementById('save-status');if(!el)return;
  clearTimeout(_saveTimer);
  if(s==='saving'){el.textContent='💾';el.style.color='#fbbf24';el.style.visibility='visible';}
  else if(s==='saved'){el.textContent='✓';el.style.color='#4ade80';el.style.visibility='visible';_saveTimer=setTimeout(()=>el.style.visibility='hidden',2000);}
  else if(s==='error'){el.textContent='⚠️';el.style.color='#ef4444';el.style.visibility='visible';_saveTimer=setTimeout(()=>el.style.visibility='hidden',3500);}
  else{el.style.visibility='hidden';}
}

let _jsonpSeq=0;
function _jsonp(url){
  return new Promise(resolve=>{
    const cb='_rpg'+(++_jsonpSeq);
    const s=document.createElement('script');
    const t=setTimeout(()=>{console.warn('[JSONP] timeout:',url.substring(0,80));delete window[cb];s.remove();resolve(null);},15000);
    window[cb]=d=>{clearTimeout(t);delete window[cb];s.remove();resolve(d);};
    s.onerror=(e)=>{console.error('[JSONP] script error:',e);clearTimeout(t);delete window[cb];s.remove();resolve(null);};
    s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
    console.log('[JSONP] →',url.substring(0,120)+'...');
    document.head.appendChild(s);
  });
}

async function saveToCloud(pid){
  if(!pid)return;
  const stateJson=JSON.stringify(state.players[pid]);
  localStorage.setItem('rpg_state_'+pid,stateJson);
  if(!SCRIPT_URL)return;
  showSaveStatus('saving');
  // POST (not GET+JSONP) — a big library of books would otherwise blow past the
  // URL-length limit on a GET request and silently fail to save anything at all.
  try{
    const res=await fetch(SCRIPT_URL,{
      method:'POST',
      body:JSON.stringify({playerId:pid,state:state.players[pid]}),
      headers:{'Content-Type':'text/plain;charset=utf-8'},
    });
    const r=await res.json();
    showSaveStatus(r&&r.ok?'saved':'error');
  }catch(e){
    console.error('[Save] failed:',e);
    showSaveStatus('error');
  }
}

async function loadFromCloud(pid){
  if(!SCRIPT_URL)return null;
  console.log('[Load] player:',pid);
  const d=await _jsonp(SCRIPT_URL+'?action=load&playerId='+encodeURIComponent(pid));
  console.log('[Load] result:',d);
  return(d&&!d.error&&Object.keys(d).length>0)?d:null;
}

// ═══════════ LOC ICONS — individual files ═══════════
function locIconEl(locId,size=64){
  const FILES={oak:'loc_oak.png',pallet:'loc_pallet.png',forest:'loc_forest.png',
               glade:'loc_glade.png',butterfly:'loc_butterfly.png',caves:'loc_caves.png',
               shore:'loc_shore.png',map2:'loc_map2.png'};
  const src=FILES[locId];
  const loc=_anyLoc(locId);
  if(!src) return`<div style="font-size:${Math.round(size*.55)}px;text-align:center;line-height:${size}px;width:${size}px;height:${size}px;margin:0 auto">${loc?loc.emoji:''}</div>`;
  const em=loc?loc.emoji:'?';
  return`<div style="width:${size}px;height:${size}px;border-radius:50%;overflow:hidden;margin:0 auto;flex-shrink:0"><img src="${src}" style="width:100%;height:100%;object-fit:cover;object-position:center center;display:block" onerror="this.parentElement.style.cssText+='display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.55)}px';this.parentElement.textContent='${em}'"></div>`;
}

initState();showSelect();
window.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden'&&cur)
    localStorage.setItem('rpg_state_'+cur,JSON.stringify(state.players[cur]));
});
